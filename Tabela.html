<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 07 - Tabela</title>
</head>
<body>
    <h1>Aula 07 - Tabela</h1>
    <table>
        <caption>Tabela de conversão de medidas</caption>
        <thead>
            <tr>
                <th>Medida</th>
                <th>Volume</th>
                <th>Peso (farinha de trigo)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1 xícara</td>
                <td>240ml</td>
                <td>160g</td>
            </tr>
            <tr>
                <td>1 copo americano</td>
                <td>250ml</td>
                <td>167g</td>
            </tr>
            <tr>
                <td>1 colher de sopa</td>
                <td>15ml</td>
                <td>10g</td>
            </tr>
            <tr>
                <td>1 colher de chá</td>
                <td>5ml</td>
                <td>3,5g</td>
            </tr>
        </tbody>
    </table>
    
</body>
</html>
